<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Attendance System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/flowbite@3.0.0/dist/flowbite.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-dark text-light py-4">
  <div class="container-xl px-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-10 col-lg-8">
        <div class="card mb-4 bg-gray-900 border-0 rounded-4 shadow-lg">
          <div class="card-body p-4">
            <h2 class="text-white fw-bold mb-4 text-center">Attendance System</h2>
            <p class="text-light text-center">Last update: July 15</p>
            
            <!-- <div class="d-flex justify-content-center mb-4 gap-3 flex-wrap">
              <a href="http://localhost:8080/csv-to-html-table/" target="_blank" class="btn btn-outline-light mb-3">
                <i class="fas fa-table"></i> View Report
              </a>
              <a href="http://localhost:8080/analysis.html" target="_blank" class="btn btn-outline-light mb-3">
                <i class="fas fa-chart-line"></i> Analysis
              </a>
              <a href="https://samtime101.github.io/RemoteSave/pages/see.html?path=space/2fa/" target="_blank" class="btn btn-outline-light mb-3">
                <i class="fas fa-cloud"></i> Online Data
              </a>
            </div> -->

            <form id="userForm" class="text-center">
              <div class="d-flex justify-content-center gap-3 mb-3 flex-wrap">
                <button type="button" id="startScanning" class="btn btn-outline-light mb-3">
                  <i class="fas fa-broadcast-tower"></i> Start Scanning
                </button>
              </div>

              <button type="button" id="startCamera" class="btn btn-outline-light mb-3" style="display: none;">
                <i class="fas fa-camera"></i> Use Camera
              </button>

              <div class="text-center">
                <video id="video" autoplay playsinline style="display: none;" class="mx-auto mb-3"></video>
                <button type="button" id="captureBtn" class="btn btn-outline-light mb-3 " style="display: none;">
                  <i class="fas fa-camera-retro"></i> Capture
                </button>
                <img id="preview" src="#" alt="Preview" style="display: none;" class="img-fluid mb-3 mx-auto" />
                <button type="submit" class="btn btn-outline-light mb-3" style="display: none;" id="detect">
                  <i class="fas fa-microchip"></i> Detect
                </button>
              </div>
            </form>

            <div class="mt-4 text-center">
              <div id="status">Initializing...</div>
              <div id="liveFreq"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="text-center mt-4 text-muted">
    <p>July 15 - Remote Save</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/js-sha256@0.9.0/build/sha256.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tone@next/build/Tone.js"></script>
  <script src="{{ url_for('static', filename='js/index.js') }}"></script>
</body>
</html>
